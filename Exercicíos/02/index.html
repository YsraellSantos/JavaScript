<!DOCTYPE html>
<html lang="tp-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Primeiros passo com js</title>

    <style>
        body{
            background-color:rgba(255, 0, 0, 0.399);
            color: rgb(0, 0, 0);
            font-family: normal 18px system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }
        h1{
            text-align: center;
            margin-top: 30px;
        }
        p{
            color: rgb(51, 37, 12);
            font-size: 20px;
            text-align: center;
        }

    </style>

</head>
<body>

    <h1>
        Olá Mundo!
    </h1>

    <p>Já me leivrei da maldição</p>

   <script>
      // A variavel Nome recebe window.prompt
      var nome = window.prompt('whats your name?')
      window.alert('É um prazer em ti conhecer, ' + nome)

      var idade = window.prompt('Quantos anos você tem ?')
      window.confirm('not bad, ' + idade)

      var sexo = window.prompt('what is your sex?')
      window.alert('very good, ' + sexo)
    </script>

</body>
</html>
